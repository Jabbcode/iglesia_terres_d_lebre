name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      (
        github.event.pull_request.head.ref == 'develop' ||
        startsWith(github.event.pull_request.head.ref, 'hotfix/')
      ) &&
      (
        contains(github.event.pull_request.labels.*.name, 'release-type/patch') ||
        contains(github.event.pull_request.labels.*.name, 'release-type/minor') ||
        contains(github.event.pull_request.labels.*.name, 'release-type/major')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comprobar si hay cambios de código
        id: codecheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=$(gh api "repos/${{ github.repository }}/compare/${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" --jq '.files[].filename')
          if echo "$files" | grep -qE '^(src/|prisma/|next\.config\.ts$|package\.json$|package-lock\.json$|tsconfig\.json$)'; then
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_code_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Avisar que no hubo cambios de código
        if: steps.codecheck.outputs.has_code_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "⚠️ Este PR no tiene cambios en \`src/\`, \`prisma/\` ni configs de build/runtime — no se generó ninguna versión ni release."

      - name: Determine bump type
        id: bump
        if: steps.codecheck.outputs.has_code_changes == 'true'
        run: |
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'release-type/major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'release-type/minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new version
        id: version
        if: steps.codecheck.outputs.has_code_changes == 'true'
        run: |
          current=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          echo "new=$major.$minor.$patch" >> "$GITHUB_OUTPUT"
          echo "previous=$current" >> "$GITHUB_OUTPUT"

      - name: Bump package.json
        if: steps.codecheck.outputs.has_code_changes == 'true'
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${{ steps.version.outputs.new }}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"

      - name: Generate release notes
        id: notes
        if: steps.codecheck.outputs.has_code_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="v${{ steps.version.outputs.new }}" \
            -f previous_tag_name="v${{ steps.version.outputs.previous }}" \
            --jq '.body' > /tmp/notes.md

      - name: Limpiar ruido de las notas generadas
        id: clean
        if: steps.codecheck.outputs.has_code_changes == 'true'
        run: |
          sed -i "/^<!-- Release notes generated using configuration/d" /tmp/notes.md
          sed -i "/^## What's Changed$/d" /tmp/notes.md
          awk '
            /^## New Contributors$/ { skip=1; next }
            skip && /^\*\*Full Changelog\*\*/ { skip=0 }
            skip { next }
            { print }
          ' /tmp/notes.md > /tmp/notes-clean.md
          mv /tmp/notes-clean.md /tmp/notes.md
          sed -i '/./,/^$/!d' /tmp/notes.md
          sed -i -E 's/^\* (feat|fix|refactor|docs|chore|style|test|db|security|perf): /* /' /tmp/notes.md
          sed -i -E 's|^\* (.+) by @[^ ]+ in (https://[^ ]+/pull/([0-9]+))$|* [#\3](\2) \1|' /tmp/notes.md

          pr_labels=$(gh pr view "${{ github.event.pull_request.number }}" --json labels --jq '.labels[].name')
          has_category_label=false
          for l in feat fix refactor docs chore style test db security perf; do
            if echo "$pr_labels" | grep -qx "$l"; then
              has_category_label=true
              break
            fi
          done
          if [ "$has_category_label" = "false" ]; then
            sed -i "/^\* \[#${{ github.event.pull_request.number }}\]/d" /tmp/notes.md
            awk '
              /^### / {
                if (heading != "" && buf != "") { printf "%s%s", heading, buf }
                heading = $0 "\n"
                buf = ""
                next
              }
              /^\* / { buf = buf $0 "\n"; next }
              {
                if (heading != "") {
                  if (buf != "") printf "%s%s", heading, buf
                  heading=""; buf=""
                }
                print
              }
              END { if (heading != "" && buf != "") printf "%s%s", heading, buf }
            ' /tmp/notes.md > /tmp/notes-agg.md
            mv /tmp/notes-agg.md /tmp/notes.md
          fi

          compare_url=$(grep -m1 '^\*\*Full Changelog\*\*' /tmp/notes.md | grep -oE 'https://\S+')
          range=$(echo "$compare_url" | grep -oE '[^/]+$')
          sed -i '/^\*\*Full Changelog\*\*/d' /tmp/notes.md
          content=$(cat /tmp/notes.md)
          printf '%s\n' "$content" > /tmp/notes.md

          echo "compare_url=$compare_url" >> "$GITHUB_OUTPUT"
          echo "range=$range" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        if: steps.codecheck.outputs.has_code_changes == 'true'
        run: |
          date=$(date +%Y-%m-%d)
          {
            head -n 6 CHANGELOG.md
            echo ""
            echo "## [${{ steps.version.outputs.new }}] - $date"
            echo ""
            cat /tmp/notes.md
            echo ""
            tail -n +7 CHANGELOG.md
          } > /tmp/changelog-new.md
          mv /tmp/changelog-new.md CHANGELOG.md

          bullet="- [${{ steps.clean.outputs.range }}](${{ steps.clean.outputs.compare_url }})"
          if grep -q "^## Comparaciones completas$" CHANGELOG.md; then
            awk -v bullet="$bullet" '
              {
                print
                if ($0 ~ /^## Comparaciones completas$/ && !done) {
                  getline nextline
                  print nextline
                  print bullet
                  done=1
                }
              }
            ' CHANGELOG.md > /tmp/changelog-with-link.md
            mv /tmp/changelog-with-link.md CHANGELOG.md
          else
            {
              cat CHANGELOG.md
              echo ""
              echo "---"
              echo ""
              echo "## Comparaciones completas"
              echo ""
              echo "$bullet"
            } > /tmp/changelog-with-link.md
            mv /tmp/changelog-with-link.md CHANGELOG.md
          fi

      - name: Commit version bump
        if: steps.codecheck.outputs.has_code_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git push origin main

      - name: Create and push tag
        if: steps.codecheck.outputs.has_code_changes == 'true'
        run: |
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        if: steps.codecheck.outputs.has_code_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new }}" \
            --title "v${{ steps.version.outputs.new }}" \
            --notes "Ver [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) para el detalle de cambios."

      - name: Create sync PR to develop
        if: steps.codecheck.outputs.has_code_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base develop \
            --head main \
            --title "chore: sync develop con main v${{ steps.version.outputs.new }}" \
            --label "chore" \
            --body "Sincroniza \`develop\` con el CHANGELOG y version bump de v${{ steps.version.outputs.new }} publicados en \`main\`."
