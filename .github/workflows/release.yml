name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'develop' &&
      (
        contains(github.event.pull_request.labels.*.name, 'release-type/patch') ||
        contains(github.event.pull_request.labels.*.name, 'release-type/minor') ||
        contains(github.event.pull_request.labels.*.name, 'release-type/major')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump
        run: |
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'release-type/major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'release-type/minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new version
        id: version
        run: |
          current=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          echo "new=$major.$minor.$patch" >> "$GITHUB_OUTPUT"
          echo "previous=$current" >> "$GITHUB_OUTPUT"

      - name: Bump package.json
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${{ steps.version.outputs.new }}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="v${{ steps.version.outputs.new }}" \
            -f previous_tag_name="v${{ steps.version.outputs.previous }}" \
            --jq '.body' > /tmp/notes.md

      - name: Limpiar ruido de las notas generadas
        run: |
          sed -i "/^<!-- Release notes generated using configuration/d" /tmp/notes.md
          sed -i "/^## What's Changed$/d" /tmp/notes.md
          awk '
            /^## New Contributors$/ { skip=1; next }
            skip && /^\*\*Full Changelog\*\*/ { skip=0 }
            skip { next }
            { print }
          ' /tmp/notes.md > /tmp/notes-clean.md
          mv /tmp/notes-clean.md /tmp/notes.md
          sed -i '/./,/^$/!d' /tmp/notes.md
          sed -i -E 's/^\* (feat|fix|refactor|docs|chore|style|test|db|security|perf): /* /' /tmp/notes.md
          sed -i -E 's|^\* (.+) by @[^ ]+ in (https://[^ ]+/pull/([0-9]+))$|* [#\3](\2) \1|' /tmp/notes.md

      - name: Update CHANGELOG.md
        run: |
          date=$(date +%Y-%m-%d)
          {
            head -n 6 CHANGELOG.md
            echo ""
            echo "## [${{ steps.version.outputs.new }}] - $date"
            echo ""
            cat /tmp/notes.md
            echo ""
            tail -n +7 CHANGELOG.md
          } > /tmp/changelog-new.md
          mv /tmp/changelog-new.md CHANGELOG.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new }}" \
            --title "v${{ steps.version.outputs.new }}" \
            --notes-file /tmp/notes.md

      - name: Create sync PR to develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base develop \
            --head main \
            --title "chore: sync develop con main v${{ steps.version.outputs.new }}" \
            --label "chore" \
            --body "Sincroniza \`develop\` con el CHANGELOG y version bump de v${{ steps.version.outputs.new }} publicados en \`main\`."
